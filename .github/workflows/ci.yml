name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: task_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          bundler-cache: true

      - name: Setup database
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/task_manager_test
          RAILS_ENV: test
        run: |
          bundle exec rails db:create db:migrate

      - name: Run RSpec
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/task_manager_test
          RAILS_ENV: test
        run: bundle exec rspec

      - name: Run Rubocop
        run: bundle exec rubocop
